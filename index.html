<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>동네슈퍼 예약 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>🛒 동네슈퍼 예약관리</h1>
    <div class="topbar-actions">
      <button id="btnExport" class="btn btn-ghost" title="CSV 내려받기">⬇ CSV</button>
      <button id="btnReset" class="btn btn-ghost" title="로컬 변경 초기화">↺</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="lookup" role="tab">조회</button>
    <button class="tab" data-tab="pending" role="tab">
      미수령 <span id="pendingBadge" class="badge">0</span>
    </button>
    <button class="tab" data-tab="sheet" role="tab">전체 시트</button>
  </nav>

  <main>
    <!-- 조회 탭 -->
    <section id="tab-lookup" class="tab-panel active">
      <div class="search-card">
        <label for="phoneInput" class="label">전화번호 뒷 4자리</label>
        <div class="search-row">
          <input
            id="phoneInput"
            type="tel"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="4"
            placeholder="예: 4821"
            autocomplete="off"
          />
          <button id="btnSearch" class="btn btn-primary">조회</button>
        </div>
        <p id="searchHint" class="hint">숫자 4자리를 입력하세요.</p>
      </div>

      <div id="lookupResult" class="result"></div>
    </section>

    <!-- 전체 시트 탭 -->
    <section id="tab-sheet" class="tab-panel">
      <div class="sheet-toolbar">
        <input
          id="sheetSearch"
          type="search"
          placeholder="🔎 물품명·고객·비고 검색"
          autocomplete="off"
        />
        <div class="sheet-meta">
          <span id="sheetCount">0건</span>
        </div>
      </div>
      <div class="sheet-wrap">
        <table class="sheet" id="sheetTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- 미수령 탭 -->
    <section id="tab-pending" class="tab-panel">
      <div class="pending-header">
        <h2>미수령 현황</h2>
        <div class="filter-row">
          <label class="chip">
            <input type="checkbox" id="filterOverdue" />
            기한지난 건만
          </label>
        </div>
      </div>
      <div id="pendingResult" class="result"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
